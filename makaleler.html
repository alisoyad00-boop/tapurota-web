<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="theme-color" content="#1a1208" />
  <link rel="canonical" href="https://www.tapurota.com/makaleler" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="tr_TR" />
  <meta property="og:site_name" content="Tapu Rota" />
  <meta property="og:url" content="https://www.tapurota.com/makaleler" />
  <meta property="og:title" content="Yatırım Rehberi — Tapu Rota" />
  <meta property="og:description" content="Arsa, tapu, imar ve değerleme üzerine uzman içerikler." />
  <meta property="og:image" content="https://www.tapurota.com/brand_assets/logo.svg" />
  <meta property="og:image:alt" content="Tapu Rota Logo" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Yatırım Rehberi — Tapu Rota" />
  <meta name="twitter:description" content="Arsa, tapu, imar ve değerleme üzerine uzman içerikler." />
  <meta name="twitter:image" content="https://www.tapurota.com/brand_assets/logo.svg" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="https://i.imgur.com/HLZP8N3.jpeg" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="assets/styles.css?v=21" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Yatırım Rehberi",
    "url": "https://www.tapurota.com/makaleler",
    "description": "Arsa yatırımı, tapu işlemleri, imar durumu ve gayrimenkul değerleme üzerine uzman içerikler.",
    "inLanguage": "tr-TR",
    "isPartOf": { "@id": "https://www.tapurota.com/#website" },
    "publisher": {
      "@type": "Organization",
      "name": "Tapu Rota",
      "url": "https://www.tapurota.com/",
      "logo": "https://www.tapurota.com/brand_assets/logo.svg"
    },
    "breadcrumb": {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Anasayfa", "item": "https://www.tapurota.com/" },
        { "@type": "ListItem", "position": 2, "name": "Yatırım Rehberi", "item": "https://www.tapurota.com/makaleler" }
      ]
    }
  }
  </script>
</head>
<body data-page="articles">
  <div id="nav-mount"></div>

  <section class="section" style="padding-top: 140px">
    <div class="container">

      <!-- Filter bar -->
      <div class="filter-bar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter-tab="all">Tüm Konular</button>
          <button class="filter-tab" data-filter-tab="arsa">Arsa Yatırımı</button>
          <button class="filter-tab" data-filter-tab="tapu">Tapu</button>
          <button class="filter-tab" data-filter-tab="imar">İmar</button>
          <button class="filter-tab" data-filter-tab="degerleme">Değerleme</button>
          <button class="filter-tab" data-filter-tab="bolge">Bölge Analizi</button>
        </div>
        <div class="filter-count">
          <strong data-filter-count>0</strong> yazı
        </div>
      </div>

      <!-- Article grid (dinamik) -->
      <div class="article-grid" id="article-grid"></div>
    </div>
  </section>

  <!-- Newsletter CTA -->
  <section class="cta-band">
    <div class="topo-bg"></div>
    <div class="cta-band-inner">
      <span class="eyebrow" style="margin-bottom:24px; display:inline-flex">Bülten</span>
      <h2 class="h-section" style="margin-top:18px">
        Yatırım fırsatlarını <em>ilk siz</em><br/>haberdar olun.
      </h2>
      <p class="lead" style="margin-top:24px">
        Yeni portföye eklenen ilanlar, bölge analizleri ve fırsat raporları her ay e-posta kutunuzda.
      </p>
      <form class="newsletter-form" style="margin-top:36px; display:flex; gap:12px; max-width:520px; margin-left:auto; margin-right:auto;"
        onsubmit="event.preventDefault(); alert('Bültenimize abone oldunuz. Yeni içerikler için teşekkürler!'); this.reset();">
        <input type="email" placeholder="E-posta adresiniz" required
          style="flex:1; min-height:48px; padding:14px 20px; border-radius:999px; border:1px solid var(--border-strong); background:var(--bg); color:var(--text-strong); font:inherit; font-size:16px; -webkit-appearance:none; appearance:none;" />
        <button type="submit" class="btn btn-gold">Abone Ol</button>
      </form>
    </div>
  </section>

  <div id="footer-mount"></div>
  <script src="assets/partials.js?v=21"></script>
  <script type="module">
    import { loadArticlesInto } from '/assets/articles.js?v=21';

    const url = new URL(location.href);
    const cat = url.searchParams.get('kategori');

    await loadArticlesInto('#article-grid', {
      ...(cat ? { category: cat } : {}),
      empty: 'Henüz yazı eklenmemiş.',
    });

    if (cat) {
      const tab = document.querySelector(`[data-filter-tab="${cat}"]`);
      if (tab) tab.click();
    }
  </script>
</body>
</html>
