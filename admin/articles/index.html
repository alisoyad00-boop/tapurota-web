<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yatırım Rehberi — Tapu Rota Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/brand_assets/logo.svg" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="adm-top">
    <div class="adm-brand">
      <span class="dot"></span>
      <div>
        <div>Tapu Rota</div>
        <small>Yönetim Paneli</small>
      </div>
    </div>
    <nav class="adm-nav">
      <a href="/admin/">İlanlar</a>
      <a href="/admin/articles/" class="active">Yatırım Rehberi</a>
    </nav>
    <div class="adm-top-right">
      <span class="adm-user" id="user-label">…</span>
      <a href="/" class="btn btn-sm" target="_blank">Siteyi Görüntüle ↗</a>
      <button class="btn btn-sm" id="logout-btn">Çıkış</button>
    </div>
  </div>

  <div class="adm-wrap">
    <div class="adm-head">
      <div>
        <h1>Yatırım Rehberi</h1>
        <p id="count-label">Yükleniyor…</p>
      </div>
      <a href="/admin/articles/edit" class="btn btn-gold">+ Yeni Yazı Ekle</a>
    </div>

    <div id="list-slot">
      <div class="card empty"><span class="spinner"></span></div>
    </div>
  </div>

  <script type="module">
    import { api, ensureAuth, escapeHtml, toast } from '/admin/admin.js';

    const user = await ensureAuth();
    if (!user) { /* redirected */ } else {
      document.getElementById('user-label').textContent = user.username;
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await api('/api/auth/logout', { method: 'POST' });
      location.href = '/admin/login';
    });

    async function load() {
      const slot = document.getElementById('list-slot');
      try {
        const { articles } = await api('/api/articles?all=1');
        document.getElementById('count-label').textContent = `${articles.length} yazı`;
        if (!articles.length) {
          slot.innerHTML = `
            <div class="card empty">
              <h2>Henüz yazı yok</h2>
              <p>İlk yazıyı eklemek için yukarıdaki butona bas.</p>
            </div>`;
          return;
        }
        slot.innerHTML = '<div class="prop-list">' + articles.map(renderRow).join('') + '</div>';
        slot.querySelectorAll('[data-delete]').forEach((btn) => {
          btn.addEventListener('click', () => removeOne(btn.dataset.delete, btn.dataset.title));
        });
      } catch (err) {
        slot.innerHTML = `<div class="card"><div class="alert">${err.message}</div></div>`;
      }
    }

    function renderRow(a) {
      const cover = a.cover || '';
      const pills = [];
      if (a.featured) pills.push('<span class="pill featured">Öne Çıkan</span>');
      if (!a.published) pills.push('<span class="pill unpub">Taslak</span>');
      pills.push(`<span class="pill">${escapeHtml(a.category_label || a.category)}</span>`);
      return `
        <div class="prop-row">
          <div class="thumb" style="background-image: url('${escapeHtml(cover)}')"></div>
          <div class="info">
            <div class="t">${escapeHtml(a.title)}</div>
            <div class="l">${a.read_minutes ? `${a.read_minutes} dk okuma` : ''} ${a.excerpt ? '· ' + escapeHtml(a.excerpt.slice(0, 80)) + '…' : ''}</div>
          </div>
          <div>${pills.join(' ')}</div>
          <div class="price"></div>
          <div class="actions">
            <a class="btn btn-sm" href="/admin/articles/edit?id=${a.id}">Düzenle</a>
            <button class="btn btn-sm btn-danger" data-delete="${a.id}" data-title="${escapeHtml(a.title)}">Sil</button>
          </div>
        </div>`;
    }

    async function removeOne(id, title) {
      if (!confirm(`"${title}" yazısı silinecek. Emin misin?`)) return;
      try {
        await api(`/api/articles/${id}`, { method: 'DELETE' });
        toast('Yazı silindi.', 'success');
        load();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    load();
  </script>
</body>
</html>
