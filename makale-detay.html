<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yazı — Tapu Rota</title>
  <meta name="description" content="Tapu Rota Yatırım Rehberi yazısı." />
  <link rel="icon" type="image/svg+xml" href="brand_assets/logo.svg" />
  <link rel="stylesheet" href="assets/styles.css?v=13" />
</head>
<body data-page="articles">
  <div id="nav-mount"></div>

  <header class="page-head" style="padding-bottom:50px;">
    <div class="topo-bg"></div>
    <div class="container">
      <div id="a-meta-top" style="font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:24px;">
        Yükleniyor…
      </div>
      <h1 class="h-display" id="a-title" style="font-size:clamp(36px, 6vw, 76px); max-width:22ch; margin:0 auto;">
        …
      </h1>
      <nav class="breadcrumb">
        <a href="index.html">Anasayfa</a>
        <span class="sep">/</span>
        <a href="makaleler.html">Yatırım Rehberi</a>
        <span class="sep">/</span>
        <span style="color:var(--gold)" id="a-breadcrumb">…</span>
      </nav>
    </div>
  </header>

  <section class="section" style="padding-top:60px">
    <article class="article-reading">
      <div class="lead-image" id="a-cover-slot" style="display:none">
        <img id="a-cover" src="" alt="" />
      </div>

      <div id="a-body">Yükleniyor…</div>

      <!-- Author / share -->
      <div style="margin-top:60px; padding-top:32px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:24px;">
        <div style="display:flex; gap:14px; align-items:center;">
          <div style="width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg, var(--gold-pale), var(--gold-deep)); display:flex; align-items:center; justify-content:center; color:#1A1208; font-family:var(--font-display); font-weight:600;">TR</div>
          <div>
            <div style="font-family:var(--font-display); font-size:17px; color:var(--text-strong); font-weight:500;">Tapu Rota Uzman Ekibi</div>
            <div style="font-size:12px; color:var(--text-subtle);">Editorial · Yatırım Rehberi</div>
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          <a href="https://wa.me/905323307430" class="footer-social" target="_blank" rel="noopener" aria-label="WhatsApp" id="a-share-wa">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4A11 11 0 0 0 4 19l-1 4 4-1a11 11 0 0 0 17-9.5A11 11 0 0 0 20 4zm-8 18a9 9 0 0 1-4.6-1.3l-.3-.2-2.7.7.7-2.6-.2-.3A9 9 0 1 1 12 22z"/></svg>
          </a>
        </div>
      </div>
    </article>
  </section>

  <!-- Related articles -->
  <section class="section" style="padding-top:0" id="a-related-section" style="display:none">
    <div class="container">
      <div class="section-head">
        <div class="label-col">
          <span class="eyebrow">İlgili Yazılar</span>
          <h2 class="h-section">Okumaya<br/><em>devam edin.</em></h2>
        </div>
      </div>
      <div class="article-grid" id="a-related-grid"></div>
    </div>
  </section>

  <div id="footer-mount"></div>
  <script src="assets/partials.js?v=13"></script>
  <script type="module">
    import { loadDetail, esc, categoryShort, renderCard, markdownToHtml } from '/assets/articles.js?v=13';

    const article = await loadDetail();
    const titleEl = document.getElementById('a-title');
    const bodyEl  = document.getElementById('a-body');

    if (!article) {
      titleEl.textContent = 'Yazı bulunamadı';
      bodyEl.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">Yazı bulunamadı veya kaldırılmış.</p>';
      document.title = 'Yazı bulunamadı — Tapu Rota';
    } else {
      // Title + meta
      titleEl.textContent = article.title;
      document.title = `${article.title} — Tapu Rota`;
      document.querySelector('meta[name=description]').setAttribute('content', article.excerpt || article.title);
      document.getElementById('a-breadcrumb').textContent = article.title;

      const metaParts = [esc(article.category_label || categoryShort(article.category))];
      if (article.read_minutes) metaParts.push(`${article.read_minutes} dk okuma`);
      if (article.created_at) {
        const d = new Date(article.created_at);
        metaParts.push(d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' }));
      }
      document.getElementById('a-meta-top').textContent = metaParts.join(' · ');

      // Cover
      if (article.cover) {
        document.getElementById('a-cover').src = article.cover;
        document.getElementById('a-cover').alt = article.title;
        document.getElementById('a-cover-slot').style.display = '';
      }

      // Body — markdown render
      bodyEl.innerHTML = article.body ? markdownToHtml(article.body) : '<p style="color:var(--text-muted)">İçerik henüz eklenmemiş.</p>';

      // WhatsApp share
      const waText = encodeURIComponent(`Bu yazıya bir göz at: ${article.title} — ${location.href}`);
      document.getElementById('a-share-wa').href = `https://wa.me/?text=${waText}`;

      // Related
      try {
        const r = await fetch(`/api/articles?category=${encodeURIComponent(article.category)}`);
        const data = await r.json();
        const related = (data.articles || []).filter((x) => x.id !== article.id).slice(0, 3);
        if (related.length) {
          document.getElementById('a-related-section').style.removeProperty('display');
          document.getElementById('a-related-grid').innerHTML = related.map(renderCard).join('');
        }
      } catch {}
    }
  </script>
</body>
</html>
